version: "3.9"

services:
  # ─── PHP-FPM (Laravel) ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: k3_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor        # persistent vendor (skip re-install)
      - storage_data:/var/www/html/storage/app   # violation images etc.
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - k3_net

  # ─── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: k3_nginx
    restart: unless-stopped
    ports:
      - "8080:80"   # akses di http://localhost:8080
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - k3_net

  # ─── MySQL 8 ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: k3_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: k3_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: k3user
      MYSQL_PASSWORD: k3pass
    ports:
      - "3307:3306"   # port 3307 di host supaya tidak bentrok dengan MySQL lokal
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - k3_net

volumes:
  mysql_data:
  vendor_cache:
  storage_data:

networks:
  k3_net:
    driver: bridge